<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WICK</title>
<meta name="description" content="WICK — invite-only agentic trading.">
<meta property="og:title" content="WICK">
<meta property="og:description" content="Invite-only agentic trading.">
<meta property="og:url" content="https://wick.network">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%2308090A'/><text x='50' y='68' font-family='monospace' font-size='52' font-weight='900' text-anchor='middle' fill='white'>W</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#030712;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--text1:#f0f4f8;--text2:#9ca3af;--text3:#4a5568;--accent:#ffb454;--green:#4ade80;--mono:'JetBrains Mono','Fira Code','Courier New',monospace}
body{background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.01) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.01) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

.shell{text-align:center;z-index:2;max-width:420px;width:100%}
.logo{font-family:var(--mono);font-size:clamp(3rem,10vw,5rem);font-weight:900;letter-spacing:.3em;background:linear-gradient(180deg,#fff 40%,#6b7280 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.tagline{font-size:13px;font-family:var(--mono);color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:48px}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 32px;margin-bottom:16px;text-align:left}
.lock{font-size:28px;margin-bottom:14px;text-align:center}
.card-title{font-size:17px;font-weight:700;margin-bottom:6px;text-align:center}
.card-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px;text-align:center}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text1);font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:rgba(255,180,84,.4)}
.form-input::placeholder{color:var(--text3)}

/* Checkboxes */
.check-group{margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.check-group input[type="checkbox"]{width:16px;height:16px;margin-top:2px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.check-label{font-size:12px;color:var(--text2);line-height:1.5}
.check-label a{color:var(--accent);text-decoration:none}
.check-label a:hover{text-decoration:underline}

/* Buttons */
.btn-submit{width:100%;padding:14px;background:var(--accent);color:#000;font-family:var(--mono);font-size:14px;font-weight:800;border:none;border-radius:8px;cursor:pointer;transition:all .3s;margin-top:20px;letter-spacing:.03em}
.btn-submit:hover:not(:disabled){background:#ffc670;box-shadow:0 8px 24px rgba(255,180,84,.15)}
.btn-submit:disabled{opacity:.35;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}

.btn-google{display:inline-flex;align-items:center;background:rgba(255,255,255,.06);color:var(--text2);font-weight:600;font-size:13px;padding:12px 20px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .3s;width:100%;justify-content:center;gap:10px}
.btn-google:hover{background:rgba(255,255,255,.1);color:var(--text1);border-color:rgba(255,255,255,.12)}
.btn-google svg{width:16px;height:16px;flex-shrink:0}

#msg{display:none;margin-top:16px;font-family:var(--mono);font-size:12px;padding:12px 16px;border-radius:8px;line-height:1.6;text-align:center}
#msg.success{display:block;color:var(--green);background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.1)}
#msg.waitlist{display:block;color:var(--accent);background:rgba(255,180,84,.06);border:1px solid rgba(255,180,84,.1)}
#msg.approved{display:block;color:var(--green);background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.12)}
#msg.error{display:block;color:#f87171;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.1)}

.signout{margin-top:12px;background:none;border:1px solid var(--border);color:var(--text3);font-family:var(--mono);font-size:11px;padding:7px 18px;border-radius:6px;cursor:pointer;display:none}
.signout:hover{color:var(--text2);border-color:rgba(255,255,255,.12)}

.footer{position:fixed;bottom:20px;display:flex;gap:16px;z-index:2}
.footer a{color:var(--text3);text-decoration:none;font-size:11px;font-family:var(--mono)}
.footer a:hover{color:var(--text2)}
</style>
</head>
<body>

<div class="shell">
  <div class="logo">WICK</div>
  <div class="tagline">Invite Only</div>

  <div class="card">
    <div class="lock">🔒</div>
    <div class="card-title">Private Beta</div>
    <div class="card-desc">WICK is an agentic trading system currently in private beta. Join the waitlist or sign in if you have access.</div>

    <!-- Waitlist form -->
    <form id="waitlist-form" onsubmit="return handleWaitlist(event)">
      <div class="form-group">
        <label class="form-label" for="wl-email">Email</label>
        <input class="form-input" type="email" id="wl-email" placeholder="you@example.com" required>
      </div>

      <label class="check-group">
        <input type="checkbox" id="chk-terms" onchange="updateSubmit()">
        <span class="check-label">I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>.</span>
      </label>

      <label class="check-group">
        <input type="checkbox" id="chk-risk" onchange="updateSubmit()">
        <span class="check-label">I understand that trading involves substantial risk of loss. WICK is not a financial advisor. Only trade money I can afford to lose.</span>
      </label>

      <label class="check-group">
        <input type="checkbox" id="chk-newsletter" checked>
        <span class="check-label">Send me updates and the WICK Weekly newsletter.</span>
      </label>

      <button class="btn-submit" type="submit" id="btn-submit" disabled>Join Waitlist</button>
    </form>

    <div class="divider">Have an invite code?</div>

    <!-- Invite code gate -->
    <div id="invite-section">
      <div class="form-group">
        <label class="form-label" for="invite-code">Invite Code</label>
        <input class="form-input" type="text" id="invite-code" placeholder="XXXX-XXXX" style="text-transform:uppercase;letter-spacing:.15em;font-family:var(--mono);text-align:center">
      </div>
      <div id="code-error" style="display:none;font-size:11px;font-family:var(--mono);color:#f87171;margin-bottom:12px;text-align:center"></div>
      <button class="btn-submit" id="btn-verify" onclick="verifyCode()" style="background:rgba(255,255,255,.08);color:var(--text1);margin-top:0">Verify Code</button>
    </div>

    <!-- Google sign-in (hidden until code verified) -->
    <div id="signin-section" style="display:none">
      <div id="code-accepted" style="font-size:11px;font-family:var(--mono);color:var(--green);text-align:center;margin-bottom:14px"></div>
      <button class="btn-google" id="btn-signin">
        <svg viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
    </div>

    <div id="msg"></div>
  </div>

  <button class="signout" id="btn-signout" onclick="signOut(auth)">Sign out</button>
</div>

<div class="footer">
  <a href="/terms">Terms</a>
  <a href="/privacy">Privacy</a>
</div>

<script>
let verifiedCode = null;

function updateSubmit() {
  document.getElementById('btn-submit').disabled =
    !document.getElementById('chk-terms').checked || !document.getElementById('chk-risk').checked;
}

async function verifyCode() {
  const input = document.getElementById('invite-code');
  const errEl = document.getElementById('code-error');
  const btn = document.getElementById('btn-verify');
  const code = input.value.trim();

  if (!code) { errEl.textContent = 'Enter your invite code'; errEl.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const d = await r.json();

    if (!r.ok) {
      errEl.textContent = d.error || 'Invalid code';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Verify Code';
      return;
    }

    verifiedCode = d.code;
    document.getElementById('invite-section').style.display = 'none';
    document.getElementById('signin-section').style.display = '';
    document.getElementById('code-accepted').textContent = 'Code accepted. Sign in to continue.';
  } catch {
    errEl.textContent = 'Connection error. Try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Verify Code';
  }
}

function handleWaitlist(e) {
  e.preventDefault();
  const email = document.getElementById('wl-email').value.trim();
  const newsletter = document.getElementById('chk-newsletter').checked;
  const btn = document.getElementById('btn-submit');
  const msg = document.getElementById('msg');

  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const promises = [
    fetch('/api/newsletter?action=subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        waitlist: true,
        newsletter,
        agreed_terms: true,
        agreed_risk: true,
        agreed_at: new Date().toISOString(),
      }),
    }),
  ];

  Promise.all(promises)
    .then(() => {
      document.getElementById('waitlist-form').style.display = 'none';
      msg.className = 'success';
      msg.innerHTML = "You're on the list.<br><span style='color:var(--text3);font-size:11px'>" + email + "</span><br><span style='color:var(--text3);font-size:10px;margin-top:4px;display:inline-block'>We'll email you when your spot opens up.</span>";
    })
    .catch(() => {
      msg.className = 'error';
      msg.textContent = 'Something went wrong. Try again.';
      btn.disabled = false;
      btn.textContent = 'Join Waitlist';
    });

  return false;
}
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey:        'AIzaSyCTvN8lVj2OlFbpiZZOtz4szRPoHzZ6OMg',
  authDomain:    'wick.network',
  projectId:     'wicknetwork',
  storageBucket: 'wicknetwork.firebasestorage.app',
});
const auth = getAuth(app);
window.auth = auth;
window.signOut = signOut;
const provider = new GoogleAuthProvider();

const msg = document.getElementById('msg');
const signinBtn = document.getElementById('btn-signin');
const signoutBtn = document.getElementById('btn-signout');
const form = document.getElementById('waitlist-form');

signinBtn.addEventListener('click', async () => {
  try { await signInWithPopup(auth, provider); }
  catch { signInWithRedirect(auth, provider); }
});

getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, async user => {
  if (!user) {
    signinBtn.style.display = '';
    signoutBtn.style.display = 'none';
    form.style.display = '';
    document.getElementById('invite-section').style.display = '';
    document.getElementById('signin-section').style.display = 'none';
    msg.style.display = 'none';
    msg.className = '';
    return;
  }

  signinBtn.style.display = 'none';
  signoutBtn.style.display = '';
  form.style.display = 'none';
  document.getElementById('invite-section').style.display = 'none';
  document.getElementById('signin-section').style.display = 'none';

  msg.className = '';
  msg.style.display = 'block';
  msg.textContent = 'Checking access…';

  try {
    const token = await user.getIdToken();
    const code = window.verifiedCode;

    // If user just signed in with a verified invite code, redeem it first
    if (code) {
      const redeem = await fetch('/api/bot?action=redeem_code', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      if (redeem.ok) {
        window.verifiedCode = null;
        // Force fresh token so allowlist check passes
        await user.getIdToken(true);
      }
    }

    const r = await fetch('/api/bot', {
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    });

    if (r.status === 403) {
      msg.className = 'waitlist';
      msg.innerHTML = "You're on the waitlist.<br><span style='color:var(--text3);font-size:11px'>" + user.email + "</span><br><span style='color:var(--text3);font-size:10px;margin-top:4px;display:inline-block'>We'll email you when your spot opens up.</span>";
      return;
    }

    if (r.ok) {
      msg.className = 'approved';
      msg.textContent = 'Access granted. Redirecting…';
      window.location.replace('/bot');
      return;
    }

    msg.className = 'error';
    msg.textContent = 'Something went wrong. Try again.';
  } catch {
    msg.className = 'error';
    msg.textContent = 'Connection error. Try again.';
  }
});
</script>
</body>
</html>
